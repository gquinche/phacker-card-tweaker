# P-Hacker Card Tweaker — default config.
#
# Tune values in the app, export this file, and back it up into
# gquinche/phacker-game under tools/card-art/ (e.g. as a sibling to
# fake_charts_cardart.py) so the notebook / bake_card_svgs.py pipeline picks
# up the same numbers. Keys deliberately mirror the real repo's tunable dicts
# (PALETTE / HATCH / SYN in tools/card-art/fake_charts_cardart.py and the
# notebook's "TWEAK HERE" cell) so copying values across is a straight lift.

palette:
  SIG: "#426183"    # EFFECT/TRUE band + chart ink
  NULL: "#767676"   # NO EFFECT/FALSE band + chart ink

# CMYK ink recipe — hand this to the litografía, and it's also what the PDF
# export writes directly into the file via CSS device-cmyk() (WeasyPrint
# >=67). 0-100 each: C, M, Y, K.
cmyk:
  effect:    [50, 26, 0, 49]    # -> #426183
  no_effect: [ 0,  0, 0, 54]    # -> #767676

hatch:
  bar:   ["///", "|||"]   # control=forward-diagonal, treatment=vertical
  box:   ["///", "+++"]   # control=forward-diagonal, treatment=plus-cross
  gauss: "/"               # Group B (dashed bell) only; Group A stays clean

hatch_lw: 2.2       # global hatch stroke weight (matplotlib rcParam)
dpi: 150            # rasterization DPI for gallery/thumbnail PNG renders
seeds_per_type: 2   # chart variants per type (2 = 20 cards/finding, matches shipped count)
band_pct: 20        # band height as % of card height (verdict-size real card is ~20%)
precolor: true      # bake the finding hex directly into exported SVGs (the
                     # game's own notebook calls this "recommended" — the
                     # alternative, currentColor + runtime recolor, is what
                     # it explicitly calls "the complexity we're trying to
                     # retire"). Kept here as a toggle for exporting either way.

# synthetic_control placebo cloud + effect line
syn:
  periods: 20
  intervention: 10
  placebos: 12
  sigma: 0.23
  lw: 1.3
  alpha: 0.15
  effect_lw: 1.8
  sig_sigma: 0.15
  null_sigma: 0.23
  toe: 0.1
  div_min: 1.0
  div_max: 1.5

# Real-card-look composite (mirrors src/styles/game-cards.css .print-card
# exactly — these are the SHIPPED values, not the notebook's rougher
# quick-preview numbers).
card:
  paper: cream              # cream | white | manila
  chart_opacity: 0.45       # real .print-card__chart opacity
  wash_alpha_sig: 0.18      # real .print-card--significant wash alpha
  wash_alpha_null: 0.16     # real .print-card--null wash alpha
  show_footer: true
  show_stamp: true
  show_creases: true

# Print atlas / PDF export.
print:
  card_w_mm: 41.27
  card_h_mm: 57.79
  bleed_mm: 3.0
  cols: 4
  rows: 4
  page: A4_portrait         # A4_portrait | A4_landscape | letter_portrait | letter_landscape
  use_cmyk: true            # write device-cmyk() colors into the PDF (needs weasyprint>=67)
  show_calibration_strip: false
  show_card_id: true
